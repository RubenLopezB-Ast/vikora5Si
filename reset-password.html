<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Restablecer contraseña</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
  padding: 50px;
}

.card {
  max-width: 400px;
  margin: auto;
  padding: 30px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

input, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}
</style>

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-9T591N4KG3"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-9T591N4KG3');
</script>

</head>

<body>

<div class="card">
  <h2>Nueva contraseña</h2>

  <input type="password" id="password" placeholder="Nueva contraseña">
  <input type="password" id="password2" placeholder="Repetir contraseña">

  <button onclick="cambiarPassword()">Actualizar contraseña</button>

  <p id="mensaje"></p>
</div>

<script>
const supabaseClient = supabase.createClient(
  "https://ghbxbxdrjqvdtgpwcypp.supabase.co",
  "sb_publishable_C6qXiQ_JPYDjMpsQcHIAcw_qQwSh5U0"
);

// 🔐 CAMBIAR PASSWORD
async function cambiarPassword() {
  const pass1 = document.getElementById("password").value;
  const pass2 = document.getElementById("password2").value;
  const mensaje = document.getElementById("mensaje");

  if (!pass1 || !pass2) {
    mensaje.innerText = "Completa todos los campos";
    mensaje.style.color = "red";
    return;
  }

  if (pass1 !== pass2) {
    mensaje.innerText = "Las contraseñas no coinciden";
    mensaje.style.color = "red";
    return;
  }

  if (pass1.length < 6) {
    mensaje.innerText = "Mínimo 6 caracteres";
    mensaje.style.color = "red";
    return;
  }

  const { error } = await supabaseClient.auth.updateUser({
    password: pass1
  });

  if (error) {
    mensaje.innerText = "Error: " + error.message;
    mensaje.style.color = "red";
  } else {
    mensaje.innerText = "Contraseña actualizada correctamente";
    mensaje.style.color = "green";

    // 🔁 REDIRECCIÓN AUTOMÁTICA
    setTimeout(() => {
      window.location.href = "https://vikora5.com/zona-usuarios-mentoria";
    }, 2000);
  }
}
</script>

<script src="js/cookies.js"></script>

</body>
</html>
